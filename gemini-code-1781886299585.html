<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact | TezRank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg-color: #FAFAFA; --surface: #FFFFFF; --text-dark: #111827; --text-muted: #6B7280; --primary: #0F172A; --accent: #D97706; --border: #E5E7EB; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-dark); line-height: 1.6; }
    a { text-decoration: none; color: inherit; transition: 0.3s; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 5%; }

    header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
    nav { display: flex; justify-content: space-between; align-items: center; height: 80px; }
    .logo { font-size: 24px; font-weight: 700; color: var(--primary); }
    .logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 40px; font-weight: 500; font-size: 15px; }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }

    .contact-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; padding: 180px 0 100px; }
    
    .contact-info h1 { font-size: 48px; color: var(--primary); margin-bottom: 16px; line-height: 1.1; }
    .contact-info p { color: var(--text-muted); font-size: 18px; margin-bottom: 40px; }
    .info-block { margin-bottom: 24px; }
    .info-block h4 { font-size: 12px; text-transform: uppercase; color: var(--accent); letter-spacing: 1px; margin-bottom: 8px; }
    .info-block p { color: var(--primary); font-weight: 500; font-size: 16px; }

    .form-box { background: var(--surface); padding: 50px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.03); }
    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; font-size: 14px; font-weight: 600; color: var(--primary); margin-bottom: 8px; }
    .form-group input, .form-group textarea { width: 100%; padding: 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-color); font-size: 15px; outline: none; transition: border-color 0.3s; }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); background: #FFF; }
    .form-group textarea { resize: vertical; min-height: 120px; }
    
    .submit-btn { width: 100%; background: var(--primary); color: white; padding: 18px; border: none; border-radius: 8px; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.3s; }
    .submit-btn:hover { background: var(--accent); }

    @media (max-width: 900px) { .contact-wrap { grid-template-columns: 1fr; gap: 40px; padding-top: 140px; } .form-box { padding: 30px; } }
  </style>
</head>
<body>

  <header>
    <div class="container">
      <nav>
        <a href="index.html" class="logo">Tez<span>Rank.</span></a>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="services.html">Services</a>
          <a href="contact.html" class="active">Contact</a>
        </div>
      </nav>
    </div>
  </header>

  <div class="container contact-wrap">
    <div class="contact-info">
      <h1>Let's build something extraordinary.</h1>
      <p>Whether you need to dominate Google rankings or redesign your digital presence, we are here to help.</p>
      
      <div class="info-block">
        <h4>Our Office</h4>
        <p>Level 4, Cyber City<br>Gurugram, Delhi NCR</p>
      </div>
      <div class="info-block">
        <h4>Email Us</h4>
        <p>hello@tezrank.com</p>
      </div>
    </div>

    <div class="form-box">
      <form onsubmit="event.preventDefault(); alert('Message sent successfully!');">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="john@company.com" required>
        </div>
        <div class="form-group">
          <label>How can we help?</label>
          <textarea placeholder="Tell us about your project..." required></textarea>
        </div>
        <button type="submit" class="submit-btn">Send Message</button>
      </form>
    </div>
  </div>

</body>
</html>
